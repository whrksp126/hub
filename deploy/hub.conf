# 서버 /srv/nginx-proxy/conf.d/hub.conf
# 작성 후: docker exec nginx_proxy nginx -s reload
server {
    listen 80;
    listen 443 ssl;
    server_name hub.ghmate.com;

    ssl_certificate /etc/nginx/certs/cloudflare_chain.crt;
    ssl_certificate_key /etc/nginx/certs/cloudflare.key;

    # 이미지 업로드(MinIO 경유) 대비 본문 크기 상향
    client_max_body_size 25m;

    location / {
        proxy_pass http://hub_app_prod:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }
}
