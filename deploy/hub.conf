# 서버 /srv/nginx-proxy/conf.d/hub.conf
# 작성 후: docker exec nginx_proxy nginx -s reload
server {
    listen 80;
    listen 443 ssl;
    server_name hub.ghmate.com;

    ssl_certificate /etc/nginx/certs/cloudflare_chain.crt;
    ssl_certificate_key /etc/nginx/certs/cloudflare.key;

    # 이미지 업로드(MinIO 경유) 대비 본문 크기 상향
    client_max_body_size 25m;

    # Docker 내장 DNS. 변수 proxy_pass 와 함께 써야 요청마다 컨테이너 IP 를 재확인한다.
    # (컨테이너명을 문자열로 직접 쓰면 reload 시점 IP 캐시 → 재배포 시 502,
    #  컨테이너가 죽으면 nginx -t 실패로 "다른 프로젝트 reload 까지 차단". 아래 패턴이 둘 다 방지.)
    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        set $up hub_app_prod;        # 변수로 넘겨야 런타임 재확인이 동작
        proxy_pass http://$up:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }
}
